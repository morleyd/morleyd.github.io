version: 2
updates:
  # App dependencies live in vue-app/ (not the repo root).
  - package-ecosystem: npm
    directory: /vue-app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One PR for the routine dev-tooling bumps instead of a dozen.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions in deploy.yml current (and off deprecated runtimes).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
